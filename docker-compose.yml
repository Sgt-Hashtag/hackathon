version: '3.8'

services:
  liaison-bot:
    build: .
    container_name: liaison_bot
    # This runs migration THEN starts the bot
    command: >
      sh -c "python app/migrate_data.py && python app/liaison_bot.py"
    restart: always
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app

  moderator-bot:
    build: .
    container_name: moderator_bot
    command: python app/moderator_bot.py
    restart: always
    environment:
      - MODERATOR_TOKEN=${MODERATOR_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app