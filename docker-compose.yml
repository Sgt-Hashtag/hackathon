version: '3.8'

services:
  liaison-bot:
    build: .
    container_name: liaison_bot
    # Runs the sync script then the bot
    command: >
      sh -c "python app/sync_equity.py && python app/liaison_bot.py"
    environment:
      - LIAISON_TOKEN=${LIAISON_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    restart: always

  moderator-bot:
    build: .
    container_name: moderator_bot
    command: python app/moderator_bot.py
    environment:
      - MODERATOR_TOKEN=${MODERATOR_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - .:/app
    restart: always

  webhook-receiver:
    build: .
    container_name: webhook_receiver
    command: python app/webhook_receiver.py
    ports:
      - "5000:5000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
    volumes:
      - .:/app
    restart: always